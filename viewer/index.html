<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord Scraper Viewer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0f; color: #e4e4e7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
    input[type="text"], select { background: #0a0a0f; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 10px 14px; color: white; font-size: 14px; outline: none; width: 100%; transition: all 0.2s; }
    input[type="text"]:focus, select:focus { border-color: rgba(88,101,242,0.5); box-shadow: 0 0 0 2px rgba(88,101,242,0.15); }
    select option { background: #111118; color: white; }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg-hover:hover { background: rgba(255,255,255,0.02); }
    .img-card:hover img { transform: scale(1.05); }
    .img-card img { transition: transform 0.3s ease; }
    .gradient-text { background: linear-gradient(135deg, #5865f2, #eb459e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .drop-zone { border: 2px dashed rgba(255,255,255,0.1); transition: all 0.3s; }
    .drop-zone.drag-over { border-color: #5865f2; background: rgba(88,101,242,0.05); }
    .stat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 12px; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    let messages = [];
    let fileName = '';
    let searchQuery = '';
    let authorFilter = '';
    let channelFilter = '';
    let currentView = 'chat';
    let sortBy = 'newest';
    let selectedImage = null;

    function handleFile(file) {
      if (!file) return;
      fileName = file.name;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          messages = JSON.parse(e.target.result);
          render();
        } catch { alert('Invalid JSON file'); }
      };
      reader.readAsText(file);
    }

    function getStats() {
      if (!messages.length) return { total: 0, images: 0, videos: 0, authors: 0, dateRange: null };
      const authors = new Set(messages.map(m => m.author));
      let images = 0, videos = 0;
      messages.forEach(m => {
        [...m.attachments, ...m.embeds].forEach(url => {
          const c = url.split('?')[0].toLowerCase();
          if (/\.(jpg|jpeg|png|gif|webp|svg|bmp)$/.test(c)) images++;
          if (/\.(mp4|webm|mov|avi)$/.test(c)) videos++;
        });
      });
      const dates = messages.map(m => new Date(m.timestamp)).sort((a, b) => a - b);
      return {
        total: messages.length, images, videos, authors: authors.size,
        dateRange: dates.length ? { first: dates[0].toLocaleDateString(), last: dates[dates.length - 1].toLocaleDateString() } : null
      };
    }

    function getFiltered() {
      return messages
        .filter(m => {
          if (searchQuery && !m.content.toLowerCase().includes(searchQuery.toLowerCase())) return false;
          if (authorFilter && m.author !== authorFilter) return false;
          if (channelFilter && m.channel !== channelFilter) return false;
          return true;
        })
        .sort((a, b) => {
          const da = new Date(a.timestamp).getTime();
          const db = new Date(b.timestamp).getTime();
          return sortBy === 'newest' ? db - da : da - db;
        });
    }

    function getAuthors() { return [...new Set(messages.map(m => m.author))].sort(); }
    function getChannels() { return [...new Set(messages.map(m => m.channel).filter(Boolean))].sort(); }

    function getMedia(filtered) {
      const images = [], videos = [];
      filtered.forEach(m => {
        [...m.attachments, ...m.embeds].forEach(url => {
          const c = url.split('?')[0].toLowerCase();
          if (/\.(jpg|jpeg|png|gif|webp|svg|bmp)$/.test(c)) images.push({ url, author: m.author, timestamp: m.timestamp, channel: m.channel });
          if (/\.(mp4|webm|mov|avi)$/.test(c)) videos.push({ url, author: m.author, timestamp: m.timestamp, channel: m.channel });
        });
      });
      return { images, videos };
    }

    function exportJSON() {
      const filtered = getFiltered();
      const json = JSON.stringify(filtered, null, 2);
      if (typeof chrome !== 'undefined' && chrome.storage) {
        const blob = new Blob([json], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${fileName.replace('.json', '')}_export.json`;
        a.click();
      } else {
        const blob = new Blob([json], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${fileName.replace('.json', '')}_export.json`;
        a.click();
      }
    }

    function exportCSV() {
      const filtered = getFiltered();
      const csv = 'Author,Content,Channel,Timestamp,Attachments\n' + filtered.map(m =>
        `"${m.author}","${m.content.replace(/"/g, '""')}","${m.channel || ''}","${m.timestamp}","${m.attachments.join('; ')}"`
      ).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${fileName.replace('.json', '')}_export.csv`;
      a.click();
    }

    function openLightbox(url) { selectedImage = url; render(); }
    function closeLightbox() { selectedImage = null; render(); }
    function setView(v) { currentView = v; render(); }
    function clearData() { messages = []; fileName = ''; searchQuery = ''; authorFilter = ''; channelFilter = ''; render(); }
    function escapeHTML(str) { return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/`([^`]+)`/g, '<code class="bg-white/10 px-1.5 py-0.5 rounded text-sm">$1</code>').replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>'); }

    function render() {
      const app = document.getElementById('app');
      const stats = getStats();

      if (!messages.length) {
        app.innerHTML = `
          <div class="flex items-center justify-center min-h-screen" id="dropzone">
            <div class="text-center p-12 bg-[#111118] rounded-3xl border border-white/5 max-w-lg shadow-2xl shadow-black/50">
              <div class="w-20 h-20 mx-auto mb-6 rounded-2xl flex items-center justify-center" style="background: linear-gradient(135deg, #5865f2, #eb459e)">
                <svg viewBox="0 0 24 24" width="40" height="40" fill="white"><path d="M20.317 4.3698a19.7913 19.7913 0 00-4.8851-1.5152.0741.0741 0 00-.0785.0371c-.211.3753-.4447.8648-.6083 1.2495-1.8447-.2762-3.68-.2762-5.4868 0-.1636-.3933-.4058-.8742-.6177-1.2495a.077.077 0 00-.0785-.037 19.7363 19.7363 0 00-4.8852 1.515.0699.0699 0 00-.0321.0277C.5334 9.0458-.319 13.5799.0992 18.0578a.0824.0824 0 00.0312.0561c2.0528 1.5076 4.0413 2.4228 5.9929 3.0294a.0777.0777 0 00.0842-.0276c.4616-.6304.8731-1.2952 1.226-1.9942a.076.076 0 00-.0416-.1057c-.6528-.2476-1.2743-.5495-1.8722-.8923a.077.077 0 01-.0076-.1277c.1258-.0943.2517-.1923.3718-.2914a.0743.0743 0 01.0776-.0105c3.9278 1.7933 8.18 1.7933 12.0614 0a.0739.0739 0 01.0785.0095c.1202.099.246.1981.3728.2924a.077.077 0 01-.0066.1276 12.2986 12.2986 0 01-1.873.8914.0766.0766 0 00-.0407.1067c.3604.698.7719 1.3628 1.225 1.9932a.076.076 0 00.0842.0286c1.961-.6067 3.9495-1.5219 6.0023-3.0294a.077.077 0 00.0313-.0552c.5004-5.177-.8382-9.6739-3.5485-13.6604a.061.061 0 00-.0312-.0286z"/></svg>
              </div>
              <h1 class="text-3xl font-bold mb-3 gradient-text">Discord Scraper Viewer</h1>
              <p class="text-[#71717a] mb-2">View your scraped Discord data with images, videos, and messages.</p>
              <p class="text-[#52525b] text-sm mb-8">Drop a JSON file or click to upload</p>
              <input type="file" id="fileInput" accept=".json" class="hidden">
              <button id="uploadBtn" class="px-8 py-4 text-white rounded-2xl font-semibold hover:opacity-90 transition-all hover:scale-105 active:scale-95 shadow-lg" style="background: linear-gradient(135deg, #5865f2, #eb459e); box-shadow: 0 10px 40px rgba(88,101,242,0.25);">
                Upload JSON File
              </button>
            </div>
          </div>
        `;
        document.getElementById('uploadBtn').addEventListener('click', () => document.getElementById('fileInput').click());
        document.getElementById('fileInput').addEventListener('change', (e) => handleFile(e.target.files[0]));
        const dz = document.getElementById('dropzone');
        dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.classList.add('drag-over'); });
        dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
        dz.addEventListener('drop', (e) => { e.preventDefault(); dz.classList.remove('drag-over'); handleFile(e.dataTransfer.files[0]); });
        return;
      }

      const filtered = getFiltered();
      const { images, videos } = getMedia(filtered);
      const authors = getAuthors();
      const channels = getChannels();

      const chatHTML = filtered.map(m => {
        const mediaHTML = [...m.attachments, ...m.embeds].map(url => {
          const c = url.split('?')[0];
          if (/\.(jpg|jpeg|png|gif|webp)$/i.test(c)) return `<button data-lightbox="${url}" class="block lightbox-btn"><img src="${url}" alt="" class="max-w-xs max-h-48 rounded-xl object-cover hover:opacity-80 transition-opacity" loading="lazy"></button>`;
          if (/\.(mp4|webm|mov)$/i.test(c)) return `<video src="${url}" controls class="max-w-xs max-h-48 rounded-xl"></video>`;
          return `<a href="${url}" target="_blank" class="inline-flex items-center gap-2 px-4 py-2 bg-[#1a1a2e] rounded-xl text-sm text-[#5865f2] hover:bg-[#1e1e3a] transition-colors border border-white/5">📎 ${c.split('/').pop()?.slice(0, 30)}</a>`;
        }).join('');

        return `
          <div class="flex gap-4 py-3 px-4 rounded-2xl msg-hover transition-colors">
            <div class="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold text-sm flex-shrink-0" style="background: linear-gradient(135deg, #5865f2, #eb459e)">
              ${m.author[0]?.toUpperCase()}
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-baseline gap-2 mb-1">
                <span class="font-semibold text-white">${m.author}</span>
                ${m.channel ? `<span class="text-xs text-[#52525b]">#${m.channel}</span>` : ''}
                <span class="text-xs text-[#52525b]">${new Date(m.timestamp).toLocaleString()}</span>
              </div>
              ${m.content ? `<p class="text-[#a1a1aa] whitespace-pre-wrap break-words leading-relaxed">${escapeHTML(m.content)}</p>` : ''}
              ${mediaHTML ? `<div class="mt-3 flex flex-wrap gap-2">${mediaHTML}</div>` : ''}
            </div>
          </div>
        `;
      }).join('');

      const imagesHTML = images.length ? `
        <div class="mb-10">
          <h3 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-[#5865f2]"></span> Images (${images.length})
          </h3>
          <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
            ${images.map(img => `
              <button data-lightbox="${img.url}" class="img-card group relative aspect-square rounded-2xl overflow-hidden bg-[#111118] border border-white/5 hover:border-[#5865f2]/50 transition-all lightbox-btn">
                <img src="${img.url}" alt="" class="w-full h-full object-cover" loading="lazy">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity">
                  <div class="absolute bottom-3 left-3 right-3">
                    <p class="text-xs text-white font-medium truncate">${img.author}</p>
                    <p class="text-[10px] text-white/60">${new Date(img.timestamp).toLocaleDateString()}</p>
                  </div>
                </div>
              </button>
            `).join('')}
          </div>
        </div>
      ` : '';

      const videosHTML = videos.length ? `
        <div>
          <h3 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-[#ed4245]"></span> Videos (${videos.length})
          </h3>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            ${videos.map(vid => `
              <div class="rounded-2xl overflow-hidden bg-[#111118] border border-white/5">
                <video src="${vid.url}" controls class="w-full"></video>
                <div class="p-3">
                  <p class="text-xs text-[#71717a]">${vid.author} · ${new Date(vid.timestamp).toLocaleDateString()}</p>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      ` : '';

      const gridItems = [...images.map(i => ({ ...i, type: 'image' })), ...videos.map(v => ({ ...v, type: 'video' }))];
      const gridHTML = gridItems.length ? `
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-2">
          ${gridItems.map(item => `
            <div class="group relative aspect-square rounded-xl overflow-hidden bg-[#111118] border border-white/5">
              ${item.type === 'image'
                ? `<button data-lightbox="${item.url}" class="w-full h-full lightbox-btn"><img src="${item.url}" alt="" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-300" loading="lazy"></button>`
                : `<video src="${item.url}" class="w-full h-full object-cover"></video>`
              }
              ${item.type === 'video' ? '<div class="absolute top-2 right-2"><span class="px-1.5 py-0.5 bg-[#ed4245] text-white text-[9px] rounded font-bold">VID</span></div>' : ''}
            </div>
          `).join('')}
        </div>
      ` : '<div class="text-center text-[#52525b] py-32">No media in filtered messages</div>';

      const viewContent = currentView === 'chat'
        ? `<div class="max-w-3xl mx-auto p-6 space-y-1">${chatHTML}</div>`
        : currentView === 'media'
        ? `<div class="p-6">${imagesHTML}${videosHTML}${!images.length && !videos.length ? '<div class="text-center text-[#52525b] py-32">No media in filtered messages</div>' : ''}</div>`
        : `<div class="p-6">${gridHTML}</div>`;

      app.innerHTML = `
        <div class="flex h-screen">
          <div class="w-72 bg-[#111118] flex-shrink-0 p-5 flex flex-col border-r border-white/5">
            <div class="mb-6">
              <h2 class="text-xl font-bold text-white mb-1 truncate">${fileName.replace('.json', '')}</h2>
              <p class="text-xs text-[#71717a]">${stats.total.toLocaleString()} messages${stats.dateRange ? ` · ${stats.dateRange.first} — ${stats.dateRange.last}` : ''}</p>
            </div>
            <div class="grid grid-cols-2 gap-2 mb-6">
              <div class="stat-card"><div class="text-lg font-bold text-white">${stats.total.toLocaleString()}</div><div class="text-[10px] text-[#52525b] uppercase tracking-wider">Messages</div></div>
              <div class="stat-card"><div class="text-lg font-bold text-[#5865f2]">${stats.images.toLocaleString()}</div><div class="text-[10px] text-[#52525b] uppercase tracking-wider">Images</div></div>
              <div class="stat-card"><div class="text-lg font-bold text-[#ed4245]">${stats.videos.toLocaleString()}</div><div class="text-[10px] text-[#52525b] uppercase tracking-wider">Videos</div></div>
              <div class="stat-card"><div class="text-lg font-bold text-[#23a55a]">${stats.authors.toLocaleString()}</div><div class="text-[10px] text-[#52525b] uppercase tracking-wider">Authors</div></div>
            </div>
            <input type="text" id="searchInput" placeholder="Search messages..." value="${searchQuery}" class="mb-4">
            <div class="space-y-3 mb-4">
              <select id="authorSelect">
                <option value="">All authors (${authors.length})</option>
                ${authors.map(a => `<option value="${a}" ${authorFilter === a ? 'selected' : ''}>${a}</option>`).join('')}
              </select>
              ${channels.length > 1 ? `
                <select id="channelSelect">
                  <option value="">All channels (${channels.length})</option>
                  ${channels.map(c => `<option value="${c}" ${channelFilter === c ? 'selected' : ''}># ${c}</option>`).join('')}
                </select>
              ` : ''}
              <select id="sortSelect">
                <option value="newest" ${sortBy === 'newest' ? 'selected' : ''}>Newest first</option>
                <option value="oldest" ${sortBy === 'oldest' ? 'selected' : ''}>Oldest first</option>
              </select>
            </div>
            <div class="flex gap-1 p-1 bg-[#0a0a0f] rounded-xl mb-4 border border-white/5">
              <button data-view="chat" class="view-btn flex-1 py-2 rounded-lg text-xs font-medium transition-all capitalize ${currentView === 'chat' ? 'bg-[#5865f2] text-white shadow-lg' : 'text-[#71717a] hover:text-white'}">chat</button>
              <button data-view="media" class="view-btn flex-1 py-2 rounded-lg text-xs font-medium transition-all capitalize ${currentView === 'media' ? 'bg-[#5865f2] text-white shadow-lg' : 'text-[#71717a] hover:text-white'}">media</button>
              <button data-view="grid" class="view-btn flex-1 py-2 rounded-lg text-xs font-medium transition-all capitalize ${currentView === 'grid' ? 'bg-[#5865f2] text-white shadow-lg' : 'text-[#71717a] hover:text-white'}">grid</button>
            </div>
            <div class="flex-1"></div>
            <div class="space-y-2">
              <button id="exportJsonBtn" class="w-full py-2 text-xs text-[#5865f2] hover:text-[#7289da] transition-colors">Export JSON</button>
              <button id="exportCsvBtn" class="w-full py-2 text-xs text-[#5865f2] hover:text-[#7289da] transition-colors">Export CSV</button>
              <button id="clearDataBtn" class="w-full py-2 text-xs text-[#52525b] hover:text-[#ed4245] transition-colors">Clear data</button>
            </div>
          </div>
          <div class="flex-1 overflow-y-auto">${viewContent}</div>
        </div>
        ${selectedImage ? `
          <div id="lightboxOverlay" class="fixed inset-0 z-50 bg-black/90 flex items-center justify-center p-8">
            <button id="closeLightbox" class="absolute top-4 right-4 text-white/50 hover:text-white text-4xl">&times;</button>
            <img src="${selectedImage}" alt="" class="max-w-full max-h-full object-contain rounded-2xl" id="lightboxImg">
          </div>
        ` : ''}
      `;

      document.getElementById('searchInput')?.addEventListener('input', (e) => { searchQuery = e.target.value; render(); });
      document.getElementById('authorSelect')?.addEventListener('change', (e) => { authorFilter = e.target.value; render(); });
      document.getElementById('channelSelect')?.addEventListener('change', (e) => { channelFilter = e.target.value; render(); });
      document.getElementById('sortSelect')?.addEventListener('change', (e) => { sortBy = e.target.value; render(); });
      document.getElementById('exportJsonBtn')?.addEventListener('click', exportJSON);
      document.getElementById('exportCsvBtn')?.addEventListener('click', exportCSV);
      document.getElementById('clearDataBtn')?.addEventListener('click', clearData);
      document.querySelectorAll('.view-btn').forEach(btn => {
        btn.addEventListener('click', () => setView(btn.dataset.view));
      });
      document.querySelectorAll('.lightbox-btn').forEach(btn => {
        btn.addEventListener('click', () => openLightbox(btn.dataset.lightbox));
      });
      document.getElementById('closeLightbox')?.addEventListener('click', closeLightbox);
      document.getElementById('lightboxOverlay')?.addEventListener('click', (e) => {
        if (e.target === e.currentTarget) closeLightbox();
      });
    }

    if (typeof chrome !== 'undefined' && chrome.storage) {
      chrome.storage.local.get('viewerData', (data) => {
        if (data.viewerData) {
          try {
            messages = JSON.parse(data.viewerData);
            fileName = 'Discord Scrape';
            render();
          } catch {}
        }
      });
    }

    render();
  </script>
</body>
</html>
