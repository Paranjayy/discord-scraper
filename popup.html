<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord Scraper</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <svg class="logo" viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
        <path d="M20.317 4.3698a19.7913 19.7913 0 00-4.8851-1.5152.0741.0741 0 00-.0785.0371c-.211.3753-.4447.8648-.6083 1.2495-1.8447-.2762-3.68-.2762-5.4868 0-.1636-.3933-.4058-.8742-.6177-1.2495a.077.077 0 00-.0785-.037 19.7363 19.7363 0 00-4.8852 1.515.0699.0699 0 00-.0321.0277C.5334 9.0458-.319 13.5799.0992 18.0578a.0824.0824 0 00.0312.0561c2.0528 1.5076 4.0413 2.4228 5.9929 3.0294a.0777.0777 0 00.0842-.0276c.4616-.6304.8731-1.2952 1.226-1.9942a.076.076 0 00-.0416-.1057c-.6528-.2476-1.2743-.5495-1.8722-.8923a.077.077 0 01-.0076-.1277c.1258-.0943.2517-.1923.3718-.2914a.0743.0743 0 01.0776-.0105c3.9278 1.7933 8.18 1.7933 12.0614 0a.0739.0739 0 01.0785.0095c.1202.099.246.1981.3728.2924a.077.077 0 01-.0066.1276 12.2986 12.2986 0 01-1.873.8914.0766.0766 0 00-.0407.1067c.3604.698.7719 1.3628 1.225 1.9932a.076.076 0 00.0842.0286c1.961-.6067 3.9495-1.5219 6.0023-3.0294a.077.077 0 00.0313-.0552c.5004-5.177-.8382-9.6739-3.5485-13.6604a.061.061 0 00-.0312-.0286zM8.02 15.3312c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9555-2.4189 2.157-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.9555 2.4189-2.1569 2.4189zm7.9748 0c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9554-2.4189 2.1569-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.946 2.4189-2.1568 2.4189z"/>
      </svg>
      <h1>Discord Scraper</h1>
    </div>

    <div class="token-section" id="tokenSection">
      <p class="hint">Click below to auto-grab your token from Discord</p>
      <button class="btn btn-token" id="getTokenBtn">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        Get Token from Discord
      </button>
      <div class="token-input-group" id="tokenInputGroup" style="display:none">
        <input type="password" id="tokenInput" placeholder="Or paste token manually" />
        <button class="btn btn-sm btn-save" id="saveTokenBtn">Save</button>
      </div>
    </div>

    <div class="main-section" id="mainSection" style="display:none">
      <div class="user-info" id="userInfo"></div>

      <div class="select-group">
        <label>Server</label>
        <select id="serverSelect"></select>
      </div>

      <div class="select-group">
        <label>Channel</label>
        <select id="channelSelect"></select>
      </div>

      <div class="collapsible">
        <button class="collapsible-toggle" id="toggleAdvanced">
          Advanced Filters
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
        </button>
        <div class="collapsible-content" id="advancedContent">
          <div class="filter-group">
            <label>Date Range</label>
            <div class="date-row">
              <input type="date" id="dateFrom">
              <span>to</span>
              <input type="date" id="dateTo">
            </div>
          </div>
          <div class="filter-group">
            <label>Author (username)</label>
            <input type="text" id="authorFilter" placeholder="Filter by author...">
          </div>
          <div class="filter-group">
            <label>Search in content</label>
            <input type="text" id="searchFilter" placeholder="Search text...">
          </div>
        </div>
      </div>

      <div class="filter-section">
        <label class="filter-label">Download types:</label>
        <div class="checkbox-group">
          <label class="checkbox-item">
            <input type="checkbox" id="filterImages" checked>
            <span class="checkmark"></span>
            <span class="checkbox-label">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="#5865f2"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
              Images
            </span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" id="filterVideos" checked>
            <span class="checkmark"></span>
            <span class="checkbox-label">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="#ed4245"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
              Videos
            </span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" id="filterZips" checked>
            <span class="checkmark"></span>
            <span class="checkbox-label">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="#fee75c"><path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"/></svg>
              ZIP / Archives
            </span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" id="filterText">
            <span class="checkmark"></span>
            <span class="checkbox-label">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="#a3a3a3"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
              Text only
            </span>
          </label>
        </div>
        <label class="checkbox-item select-all">
          <input type="checkbox" id="selectAll" checked>
          <span class="checkmark"></span>
          <span class="checkbox-label">Select All</span>
        </label>
      </div>

      <div class="stats" id="stats" style="display:none">
        <div class="stat-item">
          <span class="stat-count" id="imageCount">0</span>
          <span class="stat-label">Images</span>
        </div>
        <div class="stat-item">
          <span class="stat-count" id="videoCount">0</span>
          <span class="stat-label">Videos</span>
        </div>
        <div class="stat-item">
          <span class="stat-count" id="zipCount">0</span>
          <span class="stat-label">ZIPs</span>
        </div>
        <div class="stat-item">
          <span class="stat-count" id="textCount">0</span>
          <span class="stat-label">Text</span>
        </div>
      </div>

      <button class="btn btn-scan" id="scanBtn">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
        Start Scraping
      </button>

      <button class="btn btn-stop" id="stopBtn" style="display:none">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M6 6h12v12H6z"/></svg>
        Stop
      </button>

      <div class="counter" id="counter"></div>

      <div class="progress-bar" id="progressBar" style="display:none">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <div class="download-progress" id="downloadProgress" style="display:none">
        <div class="download-text" id="downloadText">Preparing download...</div>
        <div class="progress-bar">
          <div class="progress-fill" id="downloadFill"></div>
        </div>
      </div>

      <div class="actions" id="actions" style="display:none">
        <button class="btn btn-download" id="downloadBtn">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"/></svg>
          Download as ZIP
        </button>
        <button class="btn btn-export" id="exportBtn">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
          Export URLs
        </button>
        <div class="export-row">
          <button class="btn btn-export-text" id="exportJsonBtn">JSON</button>
          <button class="btn btn-export-text" id="exportCsvBtn">CSV</button>
          <button class="btn btn-export-text" id="exportTxtBtn">TXT</button>
        </div>
      </div>

      <div class="results" id="results" style="display:none">
        <div class="results-header">
          <span id="resultsTitle">Files found</span>
          <button class="btn-link" id="clearResults">Clear</button>
        </div>
        <div class="results-list" id="resultsList"></div>
      </div>
    </div>

    <div class="status" id="status"></div>
  </div>
  <script src="jszip.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
