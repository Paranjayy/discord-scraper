<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord Scraper</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <svg class="logo" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
        <path d="M20.317 4.3698a19.7913 19.7913 0 00-4.8851-1.5152.0741.0741 0 00-.0785.0371c-.211.3753-.4447.8648-.6083 1.2495-1.8447-.2762-3.68-.2762-5.4868 0-.1636-.3933-.4058-.8742-.6177-1.2495a.077.077 0 00-.0785-.037 19.7363 19.7363 0 00-4.8852 1.515.0699.0699 0 00-.0321.0277C.5334 9.0458-.319 13.5799.0992 18.0578a.0824.0824 0 00.0312.0561c2.0528 1.5076 4.0413 2.4228 5.9929 3.0294a.0777.0777 0 00.0842-.0276c.4616-.6304.8731-1.2952 1.226-1.9942a.076.076 0 00-.0416-.1057c-.6528-.2476-1.2743-.5495-1.8722-.8923a.077.077 0 01-.0076-.1277c.1258-.0943.2517-.1923.3718-.2914a.0743.0743 0 01.0776-.0105c3.9278 1.7933 8.18 1.7933 12.0614 0a.0739.0739 0 01.0785.0095c.1202.099.246.1981.3728.2924a.077.077 0 01-.0066.1276 12.2986 12.2986 0 01-1.873.8914.0766.0766 0 00-.0407.1067c.3604.698.7719 1.3628 1.225 1.9932a.076.076 0 00.0842.0286c1.961-.6067 3.9495-1.5219 6.0023-3.0294a.077.077 0 00.0313-.0552c.5004-5.177-.8382-9.6739-3.5485-13.6604a.061.061 0 00-.0312-.0286zM8.02 15.3312c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9555-2.4189 2.157-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.9555 2.4189-2.1569 2.4189zm7.9748 0c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9554-2.4189 2.1569-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.946 2.4189-2.1568 2.4189z"/>
      </svg>
      <div>
        <h1>Discord Scraper</h1>
        <p class="version">v1.3.2</p>
      </div>
    </div>

    <!-- Auth -->
    <div class="card" id="tokenSection">
      <p class="hint">Auto-grab your token from Discord or paste manually</p>
      <button class="btn btn-primary" id="getTokenBtn">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        Get Token from Discord
      </button>
      <div class="token-input-group" id="tokenInputGroup" style="display:none">
        <input type="password" id="tokenInput" placeholder="Or paste token manually" />
        <button class="btn btn-sm btn-save" id="saveTokenBtn">Save</button>
      </div>
    </div>

    <!-- Main -->
    <div class="main-section" id="mainSection" style="display:none">
      <div class="user-info" id="userInfo"></div>

      <!-- Server & Channel -->
      <div class="card">
        <div class="card-header">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="#949ba4"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
          <span>Server & Channels</span>
        </div>
        <div class="select-group">
          <label>Server</label>
          <select id="serverSelect"></select>
        </div>
        <div class="channel-select-group">
          <div class="channel-header">
            <label>Channels</label>
            <div class="channel-actions">
              <button class="btn-link-sm" id="selectAllChannels">All</button>
              <button class="btn-link-sm" id="selectNoChannels">None</button>
              <span class="channel-count" id="channelCount">0 selected</span>
            </div>
          </div>
          <div class="channel-list" id="channelList"></div>
        </div>
      </div>

      <!-- File Types -->
      <div class="card">
        <div class="card-header">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="#949ba4"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6z"/></svg>
          <span>Download Types</span>
          <button class="btn-link-sm" id="selectAllTypes">Select All</button>
        </div>
        <div class="type-grid">
          <label class="type-item">
            <input type="checkbox" id="filterImages" checked>
            <div class="type-icon" style="background: rgba(88,101,242,0.15); color: #5865f2;">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
            </div>
            <span class="type-label">Images</span>
          </label>
          <label class="type-item">
            <input type="checkbox" id="filterVideos" checked>
            <div class="type-icon" style="background: rgba(237,66,69,0.15); color: #ed4245;">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
            </div>
            <span class="type-label">Videos</span>
          </label>
          <label class="type-item">
            <input type="checkbox" id="filterZips" checked>
            <div class="type-icon" style="background: rgba(254,231,92,0.15); color: #fee75c;">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"/></svg>
            </div>
            <span class="type-label">Archives</span>
          </label>
          <label class="type-item">
            <input type="checkbox" id="filterPdfs">
            <div class="type-icon" style="background: rgba(237,66,69,0.15); color: #ed4245;">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13z"/></svg>
            </div>
            <span class="type-label">PDFs</span>
          </label>
          <label class="type-item">
            <input type="checkbox" id="filterAudio">
            <div class="type-icon" style="background: rgba(35,165,90,0.15); color: #23a55a;">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 3v9.28c-.47-.17-.97-.28-1.5-.28C8.01 12 6 14.01 6 16.5S8.01 21 10.5 21c2.31 0 4.2-1.75 4.45-4H15V6h4V3h-7z"/></svg>
            </div>
            <span class="type-label">Audio</span>
          </label>
          <label class="type-item">
            <input type="checkbox" id="filterCode">
            <div class="type-icon" style="background: rgba(88,101,242,0.15); color: #5865f2;">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>
            </div>
            <span class="type-label">Code</span>
          </label>
          <label class="type-item">
            <input type="checkbox" id="filterDocs">
            <div class="type-icon" style="background: rgba(0,168,252,0.15); color: #00a8fc;">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zM8 15h8v2H8v-2zm0-4h8v2H8v-2z"/></svg>
            </div>
            <span class="type-label">Docs</span>
          </label>
          <label class="type-item">
            <input type="checkbox" id="filterText" checked>
            <div class="type-icon" style="background: rgba(148,155,164,0.15); color: #949ba4;">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/></svg>
            </div>
            <span class="type-label">Messages</span>
          </label>
        </div>
      </div>

      <!-- Advanced Filters -->
      <div class="card">
        <button class="card-header card-toggle" id="toggleAdvanced">
          <div style="display:flex;align-items:center;gap:6px">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="#949ba4"><path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z"/></svg>
            <span>Advanced Filters</span>
          </div>
          <svg viewBox="0 0 24 24" width="14" height="14" fill="#949ba4" class="chevron"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
        </button>
        <div class="collapsible-content" id="advancedContent">
          <div class="filter-row">
            <div class="filter-group">
              <label>From</label>
              <input type="date" id="dateFrom">
            </div>
            <div class="filter-group">
              <label>To</label>
              <input type="date" id="dateTo">
            </div>
          </div>
          <div class="filter-group">
            <label>Author</label>
            <input type="text" id="authorFilter" placeholder="Filter by username...">
          </div>
          <div class="filter-group">
            <label>Search</label>
            <input type="text" id="searchFilter" placeholder="Search in content...">
          </div>
        </div>
      </div>

      <!-- Actions -->
      <button class="btn btn-primary btn-lg" id="scanBtn">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
        Start Scraping
      </button>
      <button class="btn btn-danger btn-lg" id="stopBtn" style="display:none">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M6 6h12v12H6z"/></svg>
        Stop
      </button>

      <!-- Progress -->
      <div class="channel-progress" id="channelProgress" style="display:none">
        <div class="channel-progress-text" id="channelProgressText"></div>
      </div>
      <div class="counter" id="counter"></div>
      <div class="progress-bar" id="progressBar" style="display:none">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <!-- Stats -->
      <div class="stats" id="stats" style="display:none">
        <div class="stat-item">
          <span class="stat-count" id="imageCount">0</span>
          <span class="stat-label">Images</span>
        </div>
        <div class="stat-item">
          <span class="stat-count" id="videoCount">0</span>
          <span class="stat-label">Videos</span>
        </div>
        <div class="stat-item">
          <span class="stat-count" id="zipCount">0</span>
          <span class="stat-label">Archives</span>
        </div>
        <div class="stat-item">
          <span class="stat-count" id="otherCount">0</span>
          <span class="stat-label">Other</span>
        </div>
      </div>
      <div class="stats-detail" id="statsDetail" style="display:none">
        <div class="stat-detail-item">
          <span class="stat-detail-label">Total Size</span>
          <span class="stat-detail-value" id="statTotal">-</span>
        </div>
        <div class="stat-detail-item">
          <span class="stat-detail-label">Avg Size</span>
          <span class="stat-detail-value" id="statAvg">-</span>
        </div>
        <div class="stat-detail-item">
          <span class="stat-detail-label">Min</span>
          <span class="stat-detail-value" id="statMin">-</span>
        </div>
        <div class="stat-detail-item">
          <span class="stat-detail-label">Max</span>
          <span class="stat-detail-value" id="statMax">-</span>
        </div>
      </div>

      <!-- Download Progress -->
      <div class="download-progress" id="downloadProgress" style="display:none">
        <div class="download-text" id="downloadText">Preparing download...</div>
        <div class="progress-bar">
          <div class="progress-fill" id="downloadFill"></div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="actions" id="actions" style="display:none">
        <div class="action-row">
          <button class="btn btn-outline" id="estimateBtn">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            Estimate Size
          </button>
          <button class="btn btn-primary" id="downloadBtn">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            Download All
          </button>
        </div>
        <div class="action-row">
          <button class="btn btn-outline" id="exportBtn">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            Copy URLs
          </button>
          <button class="btn btn-outline" id="viewerBtn">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            View in Viewer
          </button>
        </div>
        <div class="export-row">
          <button class="btn btn-sm btn-ghost" id="exportJsonBtn">JSON</button>
          <button class="btn btn-sm btn-ghost" id="exportCsvBtn">CSV</button>
          <button class="btn btn-sm btn-ghost" id="exportTxtBtn">TXT</button>
        </div>
      </div>

      <!-- Results -->
      <div class="results" id="results" style="display:none">
        <div class="results-header">
          <span id="resultsTitle">Files found</span>
          <button class="btn-link" id="clearResults">Clear</button>
        </div>
        <div class="results-list" id="resultsList"></div>
      </div>
    </div>

    <div class="status" id="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
